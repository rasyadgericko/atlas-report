<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Dark background -->
  <circle cx="24" cy="24" r="24" fill="#1a1a1a"/>
  <!-- Globe outline -->
  <circle cx="24" cy="24" r="14" stroke="#d4cfc8" stroke-width="1.2" fill="none"/>
  <!-- Vertical meridian -->
  <ellipse cx="24" cy="24" rx="6" ry="14" stroke="#d4cfc8" stroke-width="1.2" fill="none"/>
  <!-- Horizontal parallels -->
  <line x1="10" y1="19" x2="38" y2="19" stroke="#d4cfc8" stroke-width="1.2"/>
  <line x1="10" y1="24" x2="38" y2="24" stroke="#d4cfc8" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="10" y1="29" x2="38" y2="29" stroke="#d4cfc8" stroke-width="1.2"/>
  <!-- Accent dot at top -->
  <circle cx="24" cy="10" r="2" fill="#c8553a"/>
</svg>
