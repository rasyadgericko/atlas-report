<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://atlasreport.news/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F5F2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141312" media="(prefers-color-scheme: dark)" />
    <title>The Atlas Report — Free Worldwide News Aggregator</title>
    <meta name="description" content="Explore trending news from every country in the world. Free, real-time worldwide news aggregation from trusted sources like BBC, Al Jazeera, NPR, and more." />
    <meta name="keywords" content="world news, global news, news aggregator, trending news, international news, free news, BBC, Al Jazeera, NPR" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Atlas Report — Free Worldwide News Aggregator" />
    <meta property="og:description" content="Explore trending news from every country in the world. Free, real-time worldwide news aggregation from trusted sources." />
    <meta property="og:url" content="https://atlasreport.news/" />
    <meta property="og:site_name" content="The Atlas Report" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Atlas Report — Free Worldwide News Aggregator" />
    <meta name="twitter:description" content="Explore trending news from every country in the world. Free, real-time worldwide news aggregation from trusted sources." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Atlas Report",
      "url": "https://atlasreport.news/",
      "description": "Free worldwide news aggregator. Explore trending news from every country, powered by trusted sources like BBC, Al Jazeera, NPR, DW, and more.",
      "publisher": {
        "@type": "Organization",
        "name": "RYC",
        "url": "https://rycworks.com"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://atlasreport.news/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "The Atlas Report — Trending World News",
      "description": "Real-time trending news from 28+ countries, aggregated from trusted international sources.",
      "url": "https://atlasreport.news/",
      "isPartOf": {
        "@type": "WebSite",
        "name": "The Atlas Report",
        "url": "https://atlasreport.news/"
      },
      "about": {
        "@type": "Thing",
        "name": "World News"
      },
      "inLanguage": ["en", "es", "fr", "de", "pt", "ar", "zh", "ja", "ko", "hi", "id", "tr", "it", "pl", "uk", "sw", "tl"]
    }
    </script>

    <!-- Font preloads (only above-the-fold critical fonts) -->
    <link rel="preload" href="/fonts/gambarino-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/general-sans-500.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
